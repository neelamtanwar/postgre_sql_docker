version: "3.9"

services:
  db:
    image: postgres:15
    container_name: books_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
      POSTGRES_DB: bookstore
    ports:
      - "5432:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./docker/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: books_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pg_data:
